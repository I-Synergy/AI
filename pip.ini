# Project-scoped pip configuration.
# Overrides the global CodeArtifact index so plain `pip install` works
# in this workspace without needing to authenticate with AWS.
#
# Usage options:
#   1. VS Code terminal — automatic via .vscode/settings.json
#   2. Any shell      — set PIP_CONFIG_FILE=/path/to/this/pip.ini
#   3. One-off        — pip install --config-file pip.ini <package>

[global]
index-url = https://pypi.org/simple/
trusted-host =
    pypi.org
    pypi.python.org
    files.pythonhosted.org
